<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parceiro Ton - Escolha como comprar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      /* COR DO FUNDO DA TELA (Gradiente Verde) */
      background: linear-gradient(135deg, #00c853, #00e676);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }

    .container {
      background: white;
      width: 100%;
      max-width: 420px;
      border-radius: 25px;
      padding: 35px 25px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .logo {
      /* TAMANHO DA LOGO */
      width: 120px;
      margin-bottom: 20px;
    }

    h1 {
      color: #111;
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      margin-bottom: 30px;
      line-height: 1.5;
      font-size: 16px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 18px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      transition: 0.3s;
    }

    /* COR DO BOTÃO DA LOJA (Verde Escuro) */
    .btn-loja {
      background: #007a33;
      color: white;
    }

    .btn-loja:hover {
      background: #005f26;
    }

    /* COR DO BOTÃO DO WHATSAPP (Verde Claro/Padrão) */
    .btn-whats {
      background: #00d366;
      color: white;
    }

    .btn-whats:hover {
      background: #00b354;
    }

    .info {
      margin-top: 20px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="container">
    
    <!-- LOGO DA TON CORRIGIDA -->
    <img class="logo" src="https://images.tcdn.com.br/img/img_prod/1126130/1665757753_logo-ton.png" alt="Ton Logo">

    <!-- TEXTOS QUE VOCÊ PODE MUDAR -->
    <h1>Escolha como deseja comprar 👇</h1>

    <p>
      Aproveite taxas especiais, Pix 0% e entrega rápida com o cupom <b>Beneditos10</b>!
    </p>

    <!-- LINKS DOS BOTÕES -->
    <a class="btn btn-loja" href="https://ton.com.br/catalogo/?referrer=008DEE78-6B22-421C-9635-5142654DB3D4&userAnticipation=0&utm_medium=invite_share&utm_source=revendedor" target="_blank">
      🛒 Comprar direto na loja
    </a>

    <a class="btn btn-whats" href="https://wa.me/5598991901461?text=Olá,%20quero%20saber%20mais%20sobre%20as%20maquininhas%20Ton" target="_blank">
      👨‍💼 Comprar com representante
    </a>

    <!-- TEXTO DO RODAPÉ -->
    <div class="info">
      Atendimento rápido • Suporte humanizado • Condição especial
    </div>

  </div>
</body>
</html>
